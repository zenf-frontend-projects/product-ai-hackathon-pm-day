<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hackathon Day — Kickoff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #1a1d1a; }
  body { font-family: 'Switzer', -apple-system, sans-serif; }
  /* Each <section> inside deck-stage IS a slide. Style is applied via JSX
     since the slide bodies live inside React components. */
  deck-stage > section { width: 1920px; height: 1080px; }
  @keyframes cursor-blink {
    0%, 49.9% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
</style>
</head>
<body>

<deck-stage width="1920" height="1080">
  <section id="s1"></section>
  <section id="s2"></section>
  <section id="s3"></section>
  <section id="s4"></section>
  <section id="s5"></section>
  <section id="s6"></section>
  <section id="s7"></section>
  <section id="s8"></section>
</deck-stage>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>

<script>const __v = Date.now();
document.write(`<script src="content.js?v=${__v}"><\/script>`);
document.write(`<script src="deck-stage.js?v=${__v}"><\/script>`);
document.write(`<script type="text/babel" src="slides.jsx?v=${__v}"><\/script>`);</script>

<script type="text/babel">
  // Mount each slide into its <section>.
  const slides = window.SLIDES;
  slides.forEach((Slide, i) => {
    const host = document.getElementById(`s${i+1}`);
    if (host) ReactDOM.createRoot(host).render(<Slide idx={i+1} total={slides.length} />);
  });
</script>

</body>
</html>
